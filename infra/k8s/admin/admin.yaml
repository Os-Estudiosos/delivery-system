apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: admin-namespace
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: delivery-system/admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: admin-namespace
spec:
  selector:
    app: admin
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
