apiVersion: apps/v1
kind: Deployment
metadata:
  name: couriers
  namespace: city-example-namespace
  labels:
    app: couriers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: couriers
  template:
    metadata:
      labels:
        app: couriers
    spec:
      containers:
        - name: couriers
          image: delivery-system/couriers:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: couriers
  namespace: city-example-namespace
spec:
  selector:
    app: couriers
  ports:
    - name: http
      port: 4002
      targetPort: 4002
  type: ClusterIP
