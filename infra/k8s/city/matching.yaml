apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching
  namespace: city-example-namespace
  labels:
    app: matching
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matching
  template:
    metadata:
      labels:
        app: matching
    spec:
      containers:
        - name: matching
          image: delivery-system/matching:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4003
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: matching
  namespace: city-example-namespace
spec:
  selector:
    app: matching
  ports:
    - name: http
      port: 4003
      targetPort: 4003
  type: ClusterIP
