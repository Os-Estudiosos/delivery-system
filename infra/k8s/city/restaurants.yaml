apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurants
  namespace: city-example-namespace
  labels:
    app: restaurants
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurants
  template:
    metadata:
      labels:
        app: restaurants
    spec:
      containers:
        - name: restaurants
          image: delivery-system/restaurants:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4005
          livenessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: restaurants
  namespace: city-example-namespace
spec:
  selector:
    app: restaurants
  ports:
    - name: http
      port: 4005
      targetPort: 4005
  type: ClusterIP
