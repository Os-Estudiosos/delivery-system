apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: city-example-namespace
  labels:
    app: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: delivery-system/orders:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4004
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: city-example-namespace
spec:
  selector:
    app: orders
  ports:
    - name: http
      port: 4004
      targetPort: 4004
  type: ClusterIP
