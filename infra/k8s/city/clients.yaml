apiVersion: apps/v1
kind: Deployment
metadata:
  name: clients
  namespace: city-example-namespace
  labels:
    app: clients
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clients
  template:
    metadata:
      labels:
        app: clients
    spec:
      containers:
        - name: clients
          image: delivery-system/clients:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: clients
  namespace: city-example-namespace
spec:
  selector:
    app: clients
  ports:
    - name: http
      port: 4001
      targetPort: 4001
  type: ClusterIP
